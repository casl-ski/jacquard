<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Jacquard – Knitting Pattern Designer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      color: #ccc;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body { display: flex; height: 100dvh; }

    /* ---- SIDEBAR ---- */
    #sidebar {
      width: 96px;
      flex-shrink: 0;
      background: #181818;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 8px 6px;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-thumb { background: #3a3a3a; }

    .lbl {
      font-size: 9px;
      color: #444;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    hr { border: none; border-top: 1px solid #242424; flex-shrink: 0; }

    /* Palette – 2 columns */
    #palette {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }
    .c-btn {
      height: 26px;
      border-radius: 3px;
      border: 2px solid transparent;
      cursor: pointer;
      position: relative;
      transition: border-color 0.1s;
    }
    .c-btn:hover { border-color: #777; }
    .c-btn.sel  { border-color: #fff; }
    .c-num {
      position: absolute;
      bottom: 1px; right: 2px;
      font-size: 8px;
      color: rgba(255,255,255,0.55);
      text-shadow: 0 0 3px #000;
      pointer-events: none;
      line-height: 1;
    }

    .mark-btn {
      grid-column: span 2;
      height: 26px;
      border-radius: 3px;
      border: 2px solid transparent;
      cursor: pointer;
      background: #252525;
      color: #ff5555;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .mark-btn:hover { background: #2e2e2e; }
    .mark-btn.sel { border-color: #fff; }

    /* Buttons */
    .btn {
      height: 30px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      background: #242424;
      color: #999;
      width: 100%;
      flex-shrink: 0;
    }
    .btn:hover { background: #2e2e2e; color: #ddd; }
    .btn:active { background: #333; }
    .btn.active { background: #1a3a60; color: #7ab8ff; }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }

    #zoom-lbl {
      font-size: 10px;
      color: #555;
      text-align: center;
    }

    .hint {
      font-size: 9px;
      color: #2e2e2e;
      line-height: 1.7;
      text-align: center;
    }

    /* ---- CANVAS AREA ---- */
    #wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #cv {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }

    #color-input { display: none; }
  </style>
</head>
<body>

<div id="sidebar">

  <div class="lbl">Colors</div>
  <div id="palette"></div>

  <hr>
  <div class="lbl">Tool</div>
  <button class="btn active" id="btn-paint">Paint</button>
  <button class="btn" id="btn-select">Select</button>

  <hr>
  <div class="lbl">Zoom</div>
  <div class="btn-row">
    <button class="btn" id="btn-zi">+</button>
    <button class="btn" id="btn-zo">−</button>
  </div>
  <div id="zoom-lbl">100%</div>

  <hr>
  <button class="btn" id="btn-undo">↩ Undo</button>
  <div class="btn-row">
    <button class="btn" id="btn-copy">Copy</button>
    <button class="btn" id="btn-paste">Paste</button>
  </div>
  <button class="btn" id="btn-cut">Cut</button>
  <button class="btn" id="btn-clear">Clear</button>

  <hr>
  <button class="btn" id="btn-save">Save ↓</button>
  <button class="btn" id="btn-load">Load ↑</button>

  <hr>
  <div class="hint">
    Pen/mouse: draw<br>
    Finger: pan<br>
    Pinch: zoom<br>
    Scroll: zoom<br>
    Space+drag: pan<br>
    Mid-btn: pan
  </div>
</div>

<div id="wrap"><canvas id="cv"></canvas></div>
<input type="color" id="color-input">

<script>
(() => {
  // ── Constants ────────────────────────────────────────────────
  const GRID       = 64;
  const MAX_COLORS = 15;
  const MAX_UNDO   = 50;
  const HDR        = 28;   // header strip px
  const MIN_S      = 2;
  const MAX_S      = 80;
  const DEF_COLOR  = '#f5f5f5';
  const BASE_S     = 16;   // "100%" reference scale

  // ── State ────────────────────────────────────────────────────
  let vx = 0, vy = 0, vs = BASE_S;  // viewport: translate + scale
  let colors   = Array(MAX_COLORS).fill('#ffffff');
  colors[0] = '#3a6ea5';
  let grid     = Array.from({ length: GRID }, () => Array(GRID).fill(DEF_COLOR));
  let marks    = new Set();   // "r,c"
  let selIdx   = 0;
  let markMode = false;
  let tool     = 'paint';     // 'paint' | 'select'
  let undos    = [];
  let stroke   = [];
  let sel0 = null, sel1 = null, clip = null;

  // input
  let action   = null;   // 'draw' | 'pan' | 'select'
  let panRef   = null;   // { x, y, vx, vy }
  let lastCell = null;   // last painted [r,c]
  let markAdd  = true;
  let space    = false;
  let fingers  = new Map(); // touch id → {x,y}

  // ── DOM ──────────────────────────────────────────────────────
  const cv    = document.getElementById('cv');
  const ctx   = cv.getContext('2d');
  const wrap  = document.getElementById('wrap');
  const zlbl  = document.getElementById('zoom-lbl');
  const cinp  = document.getElementById('color-input');

  // ── Canvas resize ────────────────────────────────────────────
  new ResizeObserver(() => {
    cv.width  = wrap.clientWidth;
    cv.height = wrap.clientHeight;
    dirty();
  }).observe(wrap);

  // ── Render loop ──────────────────────────────────────────────
  let pending = false;
  function dirty() {
    if (pending) return;
    pending = true;
    requestAnimationFrame(render);
  }

  function render() {
    pending = false;
    const W = cv.width, H = cv.height;
    const ox = HDR + vx, oy = HDR + vy;  // screen origin of grid

    // visible tile range
    const c0 = Math.max(0, Math.floor(-vx / vs));
    const r0 = Math.max(0, Math.floor(-vy / vs));
    const c1 = Math.min(GRID, Math.ceil((W - HDR - vx) / vs));
    const r1 = Math.min(GRID, Math.ceil((H - HDR - vy) / vs));

    // background
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, W, H);

    // ── tiles ──────────────────────────────────────────────────
    for (let r = r0; r < r1; r++) {
      for (let c = c0; c < c1; c++) {
        const x  = Math.round(ox + c * vs);
        const y  = Math.round(oy + r * vs);
        const x2 = Math.round(ox + (c + 1) * vs);
        const y2 = Math.round(oy + (r + 1) * vs);
        ctx.fillStyle = grid[r][c];
        ctx.fillRect(x, y, x2 - x, y2 - y);
      }
    }

    // ── grid lines ─────────────────────────────────────────────
    if (vs >= 4) {
      ctx.beginPath();
      for (let c = c0; c <= c1; c++) {
        const x = Math.round(ox + c * vs) + 0.5;
        ctx.moveTo(x, Math.round(oy + r0 * vs));
        ctx.lineTo(x, Math.round(oy + r1 * vs));
      }
      for (let r = r0; r <= r1; r++) {
        const y = Math.round(oy + r * vs) + 0.5;
        ctx.moveTo(Math.round(ox + c0 * vs), y);
        ctx.lineTo(Math.round(ox + c1 * vs), y);
      }
      ctx.strokeStyle = 'rgba(65,65,65,0.9)';
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      ctx.stroke();
    }

    // ── grid border ────────────────────────────────────────────
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);
    ctx.strokeRect(ox + 0.5, oy + 0.5, GRID * vs, GRID * vs);

    // ── marks ──────────────────────────────────────────────────
    if (marks.size) {
      const lw = Math.max(1.5, vs / 14);
      const pad = Math.max(1, vs * 0.14);
      ctx.strokeStyle = '#ee2222';
      ctx.lineWidth = lw;
      ctx.setLineDash([]);
      ctx.beginPath();
      marks.forEach(key => {
        const [r, c] = key.split(',').map(Number);
        if (r < r0 || r >= r1 || c < c0 || c >= c1) return;
        const x = ox + c * vs, y = oy + r * vs;
        ctx.moveTo(x + pad,      y + pad);
        ctx.lineTo(x + vs - pad, y + vs - pad);
        ctx.moveTo(x + vs - pad, y + pad);
        ctx.lineTo(x + pad,      y + vs - pad);
      });
      ctx.stroke();
    }

    // ── selection ──────────────────────────────────────────────
    if (sel0 && sel1) {
      const sr1 = Math.min(sel0[0], sel1[0]);
      const sc1 = Math.min(sel0[1], sel1[1]);
      const sr2 = Math.max(sel0[0], sel1[0]);
      const sc2 = Math.max(sel0[1], sel1[1]);
      const sx = ox + sc1 * vs, sy = oy + sr1 * vs;
      const sw = (sc2 - sc1 + 1) * vs, sh = (sr2 - sr1 + 1) * vs;
      ctx.setLineDash([]);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 4;
      ctx.strokeRect(sx, sy, sw, sh);
      ctx.strokeStyle = '#00e5ff';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 5]);
      ctx.strokeRect(sx, sy, sw, sh);
      ctx.setLineDash([]);
    }

    // ── headers (drawn last, on top) ───────────────────────────
    // backgrounds
    ctx.fillStyle = '#181818';
    ctx.fillRect(0, 0, HDR, H);          // left strip
    ctx.fillRect(0, 0, W, HDR);          // top strip

    // separators
    ctx.strokeStyle = '#2e2e2e';
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(HDR + 0.5, 0); ctx.lineTo(HDR + 0.5, H);
    ctx.moveTo(0, HDR + 0.5); ctx.lineTo(W, HDR + 0.5);
    ctx.stroke();

    // numbers
    const fontSize = Math.max(7, Math.min(11, vs * 0.55));
    ctx.font = `${fontSize}px system-ui,sans-serif`;
    ctx.fillStyle = '#555';
    ctx.setLineDash([]);
    const step = Math.max(1, Math.ceil(14 / vs));

    ctx.save();
    ctx.beginPath(); ctx.rect(HDR + 1, 0, W - HDR - 1, HDR); ctx.clip();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (let c = c0; c < c1; c += step)
      ctx.fillText(c + 1, ox + c * vs + vs / 2, HDR / 2);
    ctx.restore();

    ctx.save();
    ctx.beginPath(); ctx.rect(0, HDR + 1, HDR, H - HDR - 1); ctx.clip();
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    for (let r = r0; r < r1; r += step)
      ctx.fillText(r + 1, HDR - 3, oy + r * vs + vs / 2);
    ctx.restore();
  }

  // ── Init view (fit grid in viewport) ─────────────────────────
  function initView() {
    const W = wrap.clientWidth, H = wrap.clientHeight;
    vs = Math.min((W - HDR) / GRID, (H - HDR) / GRID) * 0.92;
    vs = Math.max(MIN_S, Math.min(MAX_S, vs));
    vx = ((W - HDR) - GRID * vs) / 2;
    vy = ((H - HDR) - GRID * vs) / 2;
    zlbl.textContent = Math.round(vs / BASE_S * 100) + '%';
  }

  // ── Coords ───────────────────────────────────────────────────
  function cvPos(e) {
    const r = cv.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  function toTile(sx, sy) {
    if (sx < HDR || sy < HDR) return null;
    const c = Math.floor((sx - HDR - vx) / vs);
    const r = Math.floor((sy - HDR - vy) / vs);
    return (c >= 0 && c < GRID && r >= 0 && r < GRID) ? [r, c] : null;
  }

  // ── Zoom (toward point sx,sy in canvas coords) ───────────────
  function zoomAt(sx, sy, factor) {
    const prev = vs;
    vs = Math.max(MIN_S, Math.min(MAX_S, vs * factor));
    if (vs === prev) return;
    const ratio = vs / prev;
    vx = (sx - HDR) * (1 - ratio) + vx * ratio;
    vy = (sy - HDR) * (1 - ratio) + vy * ratio;
    zlbl.textContent = Math.round(vs / BASE_S * 100) + '%';
    dirty();
  }

  function zoomBtn(dir) {
    zoomAt(cv.width / 2, cv.height / 2, dir > 0 ? 1.3 : 1 / 1.3);
  }

  // ── Paint / mark ─────────────────────────────────────────────
  function paintCell(r, c) {
    if (selIdx < 0) return;
    const color = colors[selIdx];
    const old = grid[r][c];
    if (old === color) return;
    stroke.push([r, c, old]);
    grid[r][c] = color;
  }

  function toggleMark(r, c) {
    const k = `${r},${c}`;
    if (marks.has(k)) marks.delete(k); else marks.add(k);
  }

  function commitStroke() {
    if (stroke.length) {
      undos.push(stroke);
      if (undos.length > MAX_UNDO) undos.shift();
      stroke = [];
    }
    autoSave();
  }

  // ── Pointer events (pen + mouse) ─────────────────────────────
  cv.addEventListener('pointerdown', e => {
    if (e.pointerType === 'touch') return;
    const p = cvPos(e);
    const doPan    = e.button === 1 || (e.button === 0 && space);
    const doSelect = e.button === 2
                  || (e.button === 0 && (e.ctrlKey || e.metaKey))
                  || tool === 'select';

    e.preventDefault();
    cv.setPointerCapture(e.pointerId);

    if (doPan) {
      action = 'pan';
      panRef = { x: p.x, y: p.y, vx, vy };
      cv.style.cursor = 'grabbing';
    } else if (doSelect) {
      const pos = toTile(p.x, p.y);
      if (pos) { action = 'select'; sel0 = pos; sel1 = pos; dirty(); }
    } else {
      const pos = toTile(p.x, p.y);
      if (pos) {
        action = 'draw';
        if (markMode) {
          markAdd = !marks.has(`${pos[0]},${pos[1]}`);
          toggleMark(...pos); dirty();
        } else {
          stroke = []; lastCell = null;
          paintCell(...pos); lastCell = pos; dirty();
        }
      }
    }
  });

  cv.addEventListener('pointermove', e => {
    if (e.pointerType === 'touch') return;
    const p = cvPos(e);

    if (action === 'pan') {
      vx = panRef.vx + (p.x - panRef.x);
      vy = panRef.vy + (p.y - panRef.y);
      dirty();
    } else if (action === 'select') {
      const pos = toTile(p.x, p.y);
      if (pos) { sel1 = pos; dirty(); }
    } else if (action === 'draw') {
      const pos = toTile(p.x, p.y);
      if (!pos) return;
      if (markMode) {
        const has = marks.has(`${pos[0]},${pos[1]}`);
        if (markAdd !== has) { toggleMark(...pos); dirty(); }
      } else {
        if (!lastCell || pos[0] !== lastCell[0] || pos[1] !== lastCell[1]) {
          paintCell(...pos); lastCell = pos; dirty();
        }
      }
    }
  });

  cv.addEventListener('pointerup', e => {
    if (e.pointerType === 'touch') return;
    if (action === 'draw') commitStroke();
    if (action === 'pan') cv.style.cursor = space ? 'grab' : 'crosshair';
    action = null; panRef = null;
  });

  cv.addEventListener('pointercancel', e => {
    if (e.pointerType === 'touch') return;
    action = null; panRef = null; stroke = [];
  });

  cv.addEventListener('contextmenu', e => e.preventDefault());

  cv.addEventListener('wheel', e => {
    e.preventDefault();
    const p = cvPos(e);
    zoomAt(p.x, p.y, e.deltaY < 0 ? 1.1 : 1 / 1.1);
  }, { passive: false });

  // ── Touch events (fingers: pan + pinch) ──────────────────────
  cv.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches)
      fingers.set(t.identifier, { x: t.clientX, y: t.clientY });
  }, { passive: false });

  cv.addEventListener('touchmove', e => {
    e.preventDefault();

    // snapshot previous positions
    const prev = new Map(Array.from(fingers).map(([id, p]) => [id, { ...p }]));

    // update positions
    for (const t of e.changedTouches)
      if (fingers.has(t.identifier))
        fingers.get(t.identifier).x = t.clientX,
        fingers.get(t.identifier).y = t.clientY;

    const ids = Array.from(fingers.keys());
    const rect = cv.getBoundingClientRect();

    if (fingers.size === 1) {
      const id  = ids[0];
      const cur = fingers.get(id);
      const prv = prev.get(id);
      if (prv) { vx += cur.x - prv.x; vy += cur.y - prv.y; dirty(); }

    } else if (fingers.size >= 2) {
      const [id1, id2] = ids;
      const c1 = fingers.get(id1), c2 = fingers.get(id2);
      const p1 = prev.get(id1) || c1,  p2 = prev.get(id2) || c2;

      const pDist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
      const cDist = Math.hypot(c1.x - c2.x, c1.y - c2.y);

      // centers in canvas coords
      const pcx = (p1.x + p2.x) / 2 - rect.left;
      const pcy = (p1.y + p2.y) / 2 - rect.top;
      const ccx = (c1.x + c2.x) / 2 - rect.left;
      const ccy = (c1.y + c2.y) / 2 - rect.top;

      if (pDist > 2) {
        // combined pan+zoom in one shot — keeps prev center at curr center
        const newVs = Math.max(MIN_S, Math.min(MAX_S, vs * cDist / pDist));
        const ratio = newVs / vs;
        vx = ccx - HDR - (pcx - HDR - vx) * ratio;
        vy = ccy - HDR - (pcy - HDR - vy) * ratio;
        vs = newVs;
        zlbl.textContent = Math.round(vs / BASE_S * 100) + '%';
        dirty();
      } else {
        // pure pan
        vx += ccx - pcx; vy += ccy - pcy; dirty();
      }
    }
  }, { passive: false });

  cv.addEventListener('touchend', e => {
    for (const t of e.changedTouches) fingers.delete(t.identifier);
  }, { passive: false });

  cv.addEventListener('touchcancel', e => {
    for (const t of e.changedTouches) fingers.delete(t.identifier);
  }, { passive: false });

  // ── Keyboard ─────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !e.repeat) {
      space = true;
      if (action !== 'pan') cv.style.cursor = 'grab';
      e.preventDefault();
    }
    if (e.key === 'Escape') { sel0 = null; sel1 = null; dirty(); }

    const mod = e.ctrlKey || e.metaKey;
    if (!mod) return;
    switch (e.key.toLowerCase()) {
      case 'z': e.preventDefault(); undo();           break;
      case 'c': e.preventDefault(); copysel();        break;
      case 'x': e.preventDefault(); cutsel();         break;
      case 'v': e.preventDefault(); paste();          break;
      case 's': e.preventDefault(); exportProj();     break;
      case '=': case '+': e.preventDefault(); zoomBtn(1);  break;
      case '-': e.preventDefault(); zoomBtn(-1); break;
    }
  });

  document.addEventListener('keyup', e => {
    if (e.code === 'Space') {
      space = false;
      if (action !== 'pan') cv.style.cursor = 'crosshair';
    }
  });

  // ── Undo ─────────────────────────────────────────────────────
  function undo() {
    if (!undos.length) return;
    undos.pop().forEach(([r, c, old]) => { grid[r][c] = old; });
    dirty(); autoSave();
  }

  // ── Clear ────────────────────────────────────────────────────
  function clearGrid() {
    if (!confirm('Clear the entire grid?')) return;
    const snap = [];
    for (let r = 0; r < GRID; r++)
      for (let c = 0; c < GRID; c++)
        if (grid[r][c] !== DEF_COLOR) {
          snap.push([r, c, grid[r][c]]);
          grid[r][c] = DEF_COLOR;
        }
    marks.clear();
    if (snap.length) undos.push(snap);
    dirty(); autoSave();
  }

  // ── Selection ────────────────────────────────────────────────
  function bounds() {
    if (!sel0 || !sel1) return null;
    return {
      r1: Math.min(sel0[0], sel1[0]), c1: Math.min(sel0[1], sel1[1]),
      r2: Math.max(sel0[0], sel1[0]), c2: Math.max(sel0[1], sel1[1]),
    };
  }

  function copysel() {
    const b = bounds(); if (!b) return;
    clip = [];
    for (let r = b.r1; r <= b.r2; r++) {
      const row = [];
      for (let c = b.c1; c <= b.c2; c++) row.push(grid[r][c]);
      clip.push(row);
    }
  }

  function cutsel() {
    const b = bounds(); if (!b) return;
    copysel();
    const snap = [];
    for (let r = b.r1; r <= b.r2; r++)
      for (let c = b.c1; c <= b.c2; c++)
        if (grid[r][c] !== DEF_COLOR) {
          snap.push([r, c, grid[r][c]]);
          grid[r][c] = DEF_COLOR;
        }
    if (snap.length) undos.push(snap);
    dirty(); autoSave();
  }

  function paste() {
    if (!clip) return;
    const sr = sel0 ? sel0[0] : 0, sc = sel0 ? sel0[1] : 0;
    const snap = [];
    clip.forEach((row, ri) => row.forEach((color, ci) => {
      const r = sr + ri, c = sc + ci;
      if (r < GRID && c < GRID && grid[r][c] !== color) {
        snap.push([r, c, grid[r][c]]);
        grid[r][c] = color;
      }
    }));
    if (snap.length) undos.push(snap);
    dirty(); autoSave();
  }

  // ── Palette ──────────────────────────────────────────────────
  function buildPalette() {
    const p = document.getElementById('palette');
    p.innerHTML = '';

    for (let i = 0; i < MAX_COLORS; i++) {
      const btn = document.createElement('div');
      btn.className = 'c-btn' + (i === selIdx && !markMode ? ' sel' : '');
      btn.style.background = colors[i];

      const num = document.createElement('span');
      num.className = 'c-num';
      num.textContent = i + 1;
      btn.appendChild(num);

      btn.addEventListener('click', () => pickColor(i));
      btn.addEventListener('dblclick', e => { e.stopPropagation(); editColor(i); });

      let lastTap = 0;
      btn.addEventListener('touchend', e => {
        e.preventDefault();
        const now = Date.now();
        if (now - lastTap < 380) editColor(i);
        else pickColor(i);
        lastTap = now;
      }, { passive: false });

      p.appendChild(btn);
    }

    const mb = document.createElement('div');
    mb.className = 'mark-btn' + (markMode ? ' sel' : '');
    mb.innerHTML = '✕ Mark';
    mb.addEventListener('click', toggleMarkMode);
    let mTap = 0;
    mb.addEventListener('touchend', e => {
      e.preventDefault();
      const now = Date.now();
      if (now - mTap > 200) toggleMarkMode();
      mTap = now;
    }, { passive: false });
    p.appendChild(mb);
  }

  function pickColor(i) { selIdx = i; markMode = false; buildPalette(); }
  function toggleMarkMode() { markMode = true; selIdx = -1; buildPalette(); }

  let editIdx = -1;
  function editColor(i) { editIdx = i; cinp.value = colors[i]; cinp.click(); }

  cinp.addEventListener('input', () => {
    if (editIdx < 0) return;
    colors[editIdx] = cinp.value;
    buildPalette(); saveSettings();
  });
  cinp.addEventListener('change', () => {
    if (editIdx < 0) return;
    colors[editIdx] = cinp.value;
    buildPalette(); saveSettings();
  });

  // ── Tool buttons ─────────────────────────────────────────────
  document.getElementById('btn-paint').addEventListener('click', () => {
    tool = 'paint';
    document.getElementById('btn-paint').classList.add('active');
    document.getElementById('btn-select').classList.remove('active');
  });
  document.getElementById('btn-select').addEventListener('click', () => {
    tool = 'select';
    document.getElementById('btn-select').classList.add('active');
    document.getElementById('btn-paint').classList.remove('active');
  });
  document.getElementById('btn-zi').addEventListener('click', () => zoomBtn(1));
  document.getElementById('btn-zo').addEventListener('click', () => zoomBtn(-1));
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-clear').addEventListener('click', clearGrid);
  document.getElementById('btn-copy').addEventListener('click', copysel);
  document.getElementById('btn-cut').addEventListener('click', cutsel);
  document.getElementById('btn-paste').addEventListener('click', paste);
  document.getElementById('btn-save').addEventListener('click', exportProj);
  document.getElementById('btn-load').addEventListener('click', importProj);

  // ── Persistence ──────────────────────────────────────────────
  function saveSettings() {
    try { localStorage.setItem('jq_s', JSON.stringify({ colors })); } catch {}
  }
  function loadSettings() {
    try {
      const s = JSON.parse(localStorage.getItem('jq_s') || 'null');
      if (s?.colors) {
        colors = s.colors.slice(0, MAX_COLORS);
        while (colors.length < MAX_COLORS) colors.push('#ffffff');
      }
    } catch {}
  }
  function autoSave() {
    try {
      localStorage.setItem('jq_p', JSON.stringify({
        grid, marks: Array.from(marks)
      }));
    } catch {}
  }
  function loadProj() {
    try {
      const p = JSON.parse(localStorage.getItem('jq_p') || 'null');
      if (!p) return;
      if (p.grid) {
        const d = p.grid;
        for (let r = 0; r < Math.min(d.length, GRID); r++)
          for (let c = 0; c < Math.min(d[r].length, GRID); c++)
            grid[r][c] = d[r][c];
      }
      if (p.marks) marks = new Set(p.marks);
    } catch {}
  }

  function exportProj() {
    const blob = new Blob(
      [JSON.stringify({ grid, marks: Array.from(marks), colors }, null, 2)],
      { type: 'application/json' }
    );
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob), download: 'knitting_project.json'
    });
    a.click(); URL.revokeObjectURL(a.href);
  }

  function importProj() {
    const inp = Object.assign(document.createElement('input'), {
      type: 'file', accept: '.json'
    });
    inp.onchange = () => {
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const p = JSON.parse(ev.target.result);
          grid = Array.from({ length: GRID }, () => Array(GRID).fill(DEF_COLOR));
          if (p.grid) {
            const d = p.grid;
            for (let r = 0; r < Math.min(d.length, GRID); r++)
              for (let c = 0; c < Math.min(d[r].length, GRID); c++)
                grid[r][c] = d[r][c];
          }
          if (p.marks) marks = new Set(p.marks);
          if (p.colors) {
            colors = p.colors.slice(0, MAX_COLORS);
            while (colors.length < MAX_COLORS) colors.push('#ffffff');
            saveSettings();
          }
          buildPalette(); dirty(); autoSave();
        } catch { alert('Invalid file.'); }
      };
      reader.readAsText(inp.files[0]);
    };
    inp.click();
  }

  // ── Init ─────────────────────────────────────────────────────
  loadSettings();
  loadProj();
  buildPalette();
  cv.width  = wrap.clientWidth;
  cv.height = wrap.clientHeight;
  initView();
  dirty();

})();
</script>
</body>
</html>
